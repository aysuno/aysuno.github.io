<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Bugun Seni Ne Kadar Seviyorum</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>

body{
    background:white;
    margin:0;
    font-family:'Press Start 2P', cursive;
}

.page{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    gap:80px;
    flex-wrap: wrap; /* mobilde alt alta geçiş için */
}

/* LEFT IMAGE */

.left img{
    width:350px;
    image-rendering: pixelated;
    max-width:90vw;
}

/* PIXEL FRAME */

.frame{
    width:420px;
    height:420px;
    border:6px solid black;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:30px;
    box-sizing:border-box;
    max-width:90vw; /* mobilde kutu küçülür */
}

/* HEART */

.heart{
    font-size:32px;
    color:red;
    margin-bottom:20px;
}

/* TITLE */

h1{
    font-size:14px;
    line-height:1.6;
}

/* TEXT */

p{
    font-size:9px;
    margin-top:20px;
}

/* BUTTON */

button{
    margin-top:25px;
    padding:12px 16px;
    border:4px solid black;
    background:white;
    cursor:pointer;
    font-family:'Press Start 2P', cursive;
    font-size:10px;
}

button:hover{
    background:#eee;
}

/* RESULT */

#result{
    margin-top:25px;
    font-size:16px;
}

/* RESPONSIVE (MOBIL) */

@media screen and (max-width: 768px){
    .page{
        flex-direction: column;
        gap:30px;
        height:auto;
        padding:20px 0;
    }
    .left img{
        width:80%;
    }
    .frame{
        width:90%;
        height:auto;
        padding:20px;
    }
}

</style>
</head>

<body>

<div class="page">

<div class="left">
<img src="resim.png">
</div>

<div class="frame">

<div class="heart">♥</div>

<h1>BUGUN SENI<br>NE KADAR<br>SEVIYORUM</h1>

<p>Bugun seni yuzde kac sevecegimi ogrenmek icin butona tikla</p>

<button id="loveBtn" onclick="calculateLove()">HESAPLA</button>

<div id="result"></div>

</div>

</div>

<script>

function calculateLove(){

let percentage = Math.floor(Math.random()*101);

let message = "";

if(percentage < 30){
message = "bugun biraz az seviyorum 😅";
}
else if(percentage < 60){
message = "bugun orta seviyede seviyorum 🙂";
}
else if(percentage < 85){
message = "bugun seni baya seviyorum ❤️";
}
else{
message = "bugun sana cok asigim ❤️❤️";
}

document.getElementById("result").innerHTML =
percentage + "%<br><br>" + message;

document.getElementById("loveBtn").style.display = "none";

}

</script>

</body>
</html>
